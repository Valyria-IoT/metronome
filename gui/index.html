<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Valyria Metronome</title>
        <link rel = "stylesheet" type="text/css" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    </head>
    <body>
    <!-- CONNECTION MODAL -->
    <div id="connection-modal" class="modal" style="display: block;">
        <div class="modal-content" style="text-align: center;">
            <h2 id="connection-status">Connecting to Metronome...</h2>
            <p id="connection-ip-display" style="margin-bottom: 20px;">IP: ...</p>
            <button onclick="openSettingsFromOverlay()" style="width: 120px; height: 120px; font-size: 15px; border-radius: 50%; white-space: normal;">Change IP Settings</button>
        </div>
    </div>

    <div class="layout-container" id="main-content">

        <!-- SETTINGS BUTTON -->
        <div class="settings-btn" onclick="toggleSettings()">
            <i class="fas fa-cog"></i>
        </div>

        <!-- REFRESH ALL BUTTON -->
        <button class="refresh-all-btn" onclick="refreshAll()">Refresh All</button>

        <!-- SETTINGS MODAL -->
        <div id="settings-modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="toggleSettings()">&times;</span>
                <h2>Server Settings</h2>
                <div class="settings-form">
                    <label for="server-url">Server IP Address:</label>
                    <input type="text" id="server-url" placeholder="10.194.228.38">
                    <button onclick="saveIp()">Save IP</button>
                    <button onclick="resetIp()" class="secondary-btn">Reset to Default</button>
                </div>
            </div>
        </div>

        <!-- LEFT COLUMN -->
        <div class="left-column">
            <div id="logo-container"></div>
            <h1>Valyria Metronome</h1>
            <p>A simple dashboard for our sleeping dragon's heartbeat.</p>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="right-column">
            <div class="container">
                <div class="stats">
                    <div class="control-group">
                        <h2>Current BPM</h2>
                        <div id="current-bpm" class="bpm-display">...</div>
                        <button onclick="getBpm()">Refresh</button>
                    </div>

                    <div class="control-group">
                        <h2>Set BPM</h2><br/>
                        <input type="number" id="bpm-input" placeholder="Enter BPM"><br/><br/>
                        <button onclick="setBpm()">Set</button>
                    </div>
                </div>
                <div class="stats">
                    
                    <div class="stat">
                        <h3>Min BPM</h3>
                        <div id="min-bpm" class="stat-value">...</div>
                        <button onclick="getMinBpm()">Refresh</button>
                        <button onclick="resetMinBpm()">Reset</button>
                    </div>

                    <div class="stat">
                        <h3>Max BPM</h3>
                        <div id="max-bpm" class="stat-value">...</div>
                        <button onclick="getMaxBpm()">Refresh</button>
                        <button onclick="resetMaxBpm()">Reset</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="metronome.js"></script>
    <script>
        function openSettingsFromOverlay() {
            document.getElementById('connection-modal').style.display = 'none';
            toggleSettings();
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }

        function saveIp() {
            const ip = document.getElementById('server-url').value.trim();
            if (!ip) {
                alert('Please enter a valid IP address');
                return;
            }
            
            updateIp(ip);
            toggleSettings();
        }

        function resetIp() {
            const defaultIp = '10.194.228.38';
            document.getElementById('server-url').value = defaultIp;
            updateIp(defaultIp);
        }

        // Load saved IP on page load
        window.addEventListener('DOMContentLoaded', () => {
            const savedIp = localStorage.getItem('metronome-server-ip');
            const displayIp = savedIp || '10.194.228.38';
            document.getElementById('server-url').value = displayIp;
        });

        // Close modal when clicking outside
        window.onclick = (event) => {
            const modal = document.getElementById('settings-modal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
    </script>
</body>
</html>
