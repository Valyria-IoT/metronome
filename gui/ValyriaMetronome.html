<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Valyria Metronome</title>
        <link rel = "stylesheet" type="text/css" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    </head>
    <body>
    <div class="layout-container">

        <!-- SETTINGS BUTTON -->
        <div class="settings-btn" onclick="toggleSettings()">
            <i class="fas fa-cog"></i>
        </div>

        <!-- REFRESH ALL BUTTON -->
        <button class="refresh-all-btn" onclick="refreshAll()">Refresh All</button>

        <!-- SETTINGS MODAL -->
        <div id="settings-modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="toggleSettings()">&times;</span>
                <h2>Server Settings</h2>
                <div class="settings-form">
                    <label for="server-url">Server URL:</label>
                    <input type="text" id="server-url" placeholder="http://10.194.228.38:8080">
                    <button onclick="saveUrl()">Save</button>
                    <button onclick="resetUrl()" class="secondary-btn">Reset to Default</button>
                </div>
            </div>
        </div>

        <!-- LEFT COLUMN -->
        <div class="left-column">
            <div id="logo-container"></div>
            <h1>Valyria Metronome</h1>
            <p>A simple dashboard for our sleeping dragon's heartbeat.</p>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="right-column">
            <div class="container">
                <div class="stats">
                    <div class="control-group">
                        <h2>Current BPM</h2>
                        <div id="current-bpm" class="bpm-display">...</div>
                        <button onclick="getBpm()">Refresh</button>
                    </div>

                    <div class="control-group">
                        <h2>Set BPM</h2><br/>
                        <input type="number" id="bpm-input" placeholder="Enter BPM"><br/><br/>
                        <button onclick="setBpm()">Set</button>
                    </div>
                </div>
                <div class="stats">
                    
                    <div class="stat">
                        <h3>Min BPM</h3>
                        <div id="min-bpm" class="stat-value">...</div>
                        <button onclick="getMinBpm()">Refresh</button>
                        <button onclick="resetMinBpm()">Reset</button>
                    </div>

                    <div class="stat">
                        <h3>Max BPM</h3>
                        <div id="max-bpm" class="stat-value">...</div>
                        <button onclick="getMaxBpm()">Refresh</button>
                        <button onclick="resetMaxBpm()">Reset</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="metronome.js"></script>
    <script>
        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }

        function saveUrl() {
            const url = document.getElementById('server-url').value.trim();
            if (!url) {
                alert('Please enter a valid URL');
                return;
            }
            localStorage.setItem('metronome-server-url', url);
            updateBaseUrl(url);
            alert('URL saved successfully!');
            toggleSettings();
            location.reload(); // Reload to apply new URL
        }

        function resetUrl() {
            localStorage.removeItem('metronome-server-url');
            updateBaseUrl('http://10.194.228.38:8080');
            document.getElementById('server-url').value = 'http://10.194.228.38:8080';
            alert('URL reset to default');
            location.reload();
        }

        // Load saved URL on page load
        window.addEventListener('DOMContentLoaded', () => {
            const savedUrl = localStorage.getItem('metronome-server-url');
            const displayUrl = savedUrl || 'http://10.194.228.38:8080';
            document.getElementById('server-url').value = displayUrl;
        });

        // Close modal when clicking outside
        window.onclick = (event) => {
            const modal = document.getElementById('settings-modal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
    </script>
</body>
</html>
